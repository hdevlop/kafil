name: Verify, publish, and deploy demo

on:
  push:
    branches: [main]

concurrency:
  group: kafil-demo-vps
  cancel-in-progress: false

permissions:
  contents: read

env:
  BUN_VERSION: 1.3.14
  IMAGE_NAME: ghcr.io/hdevlop/kafil
  NEXT_PUBLIC_FORM_FILL_ENABLED: "false"

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-24.04
    env:
      DATABASE_URL: postgresql://build:build@127.0.0.1:5432/build
      FRONTEND_URL: https://demo.example.invalid
      JWT_ACCESS_SECRET: build-only-access-secret-at-least-32-characters
      JWT_REFRESH_SECRET: build-only-refresh-secret-at-least-32-characters
      NAJM_ENCRYPTION_KEY: 1111111111111111111111111111111111111111111111111111111111111111
      NEXT_PUBLIC_FORM_FILL_ENABLED: "false"
      EMAIL_PROVIDER: console
      EMAIL_DEFAULT_FROM: no-reply@example.invalid
    steps:
      - name: Check out exact revision
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install locked dependencies
        run: bun install --frozen-lockfile
      - name: Lint
        run: bun run lint
      - name: Typecheck
        run: bun run typecheck
      - name: Test
        run: bun run test
      - name: Production build
        run: bun run build

  publish:
    name: Build and publish immutable image
    needs: verify
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Check out exact revision
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
      - name: Authenticate to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f
      - name: Set image creation time
        id: created
        run: echo "value=$(date -u +%FT%TZ)" >> "$GITHUB_OUTPUT"
      - name: Build and publish
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: Dockerfile
          push: true
          provenance: mode=max
          sbom: true
          tags: ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_FORM_FILL_ENABLED=false
            OCI_CREATED=${{ steps.created.outputs.value }}
            OCI_REVISION=${{ github.sha }}

  deploy:
    name: Deploy exact image
    needs: publish
    runs-on: ubuntu-24.04
    environment: demo-vps
    permissions:
      contents: read
      packages: read
    steps:
      - name: Check out exact revision
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
      - name: Prepare versioned release bundle
        run: |
          sha256sum \
            compose.production.yml \
            deploy/Caddyfile \
            scripts/deployVps.sh \
            scripts/verifyVpsDeployment.sh \
            scripts/backupVps.sh \
            scripts/restoreRehearsalVps.sh > release.sha256
          tar -czf release-bundle.tar.gz \
            compose.production.yml release.sha256 deploy/Caddyfile scripts/deployVps.sh \
            scripts/verifyVpsDeployment.sh scripts/backupVps.sh scripts/restoreRehearsalVps.sh
      - name: Configure pinned SSH identity
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          VPS_KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
        run: |
          install -d -m 0700 "$HOME/.ssh"
          printf '%s\n' "$SSH_PRIVATE_KEY" > "$HOME/.ssh/id_ed25519"
          printf '%s\n' "$VPS_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 0600 "$HOME/.ssh/id_ed25519" "$HOME/.ssh/known_hosts"
      - name: Upload and deploy release
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
          IMAGE_DIGEST: ${{ needs.publish.outputs.digest }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        run: |
          test "$VPS_USER" = "kafil-deploy"
          release_dir="/opt/kafil/releases/${GITHUB_SHA}"
          printf '%s' "$GHCR_TOKEN" | ssh -p "$VPS_PORT" \
            -o BatchMode=yes -o StrictHostKeyChecking=yes \
            "$VPS_USER@$VPS_HOST" \
            "docker login ghcr.io --username '$GHCR_USER' --password-stdin"
          ssh -p "$VPS_PORT" -o BatchMode=yes -o StrictHostKeyChecking=yes \
            "$VPS_USER@$VPS_HOST" "install -d -m 0750 '$release_dir'"
          scp -P "$VPS_PORT" -o BatchMode=yes -o StrictHostKeyChecking=yes \
            release-bundle.tar.gz "$VPS_USER@$VPS_HOST:$release_dir/release-bundle.tar.gz"
          ssh -p "$VPS_PORT" -o BatchMode=yes -o StrictHostKeyChecking=yes \
            "$VPS_USER@$VPS_HOST" \
            "tar -xzf '$release_dir/release-bundle.tar.gz' -C '$release_dir' && chmod 0750 '$release_dir'/scripts/*.sh && '$release_dir/scripts/deployVps.sh' '$GITHUB_SHA' '$release_dir' '$IMAGE_DIGEST'"
